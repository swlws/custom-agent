<svg
    width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景圆形 -->
    <circle
    cx="100" cy="100" r="95" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2"/>

    <!-- 主要图形元素 - 抽象的SW组合 -->
    <g
        transform="translate(100, 100)">
        <!-- S曲线 -->
        <path
        d="M -30,-20 Q -30,-35 -15,-35 L 15,-35 Q 30,-35 30,-20 Q 30,-5 15,-5 L -15,-5 Q -30,-5 -30,10 Q -30,25 -15,25 L 15,25 Q 30,25 30,10" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>

        <!-- W波纹 -->
        <path
        d="M -20,20 L -5,0 L 10,20 L 25,0" fill="none" stroke="#06b6d4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- 装饰性圆点 -->
        <circle cx="-20" cy="-20" r="3" fill="#4f46e5" opacity="0.8"/>
        <circle cx="20" cy="-20" r="3" fill="#4f46e5" opacity="0.8"/>
        <circle cx="0" cy="25" r="3" fill="#06b6d4" opacity="0.8"/>
    </g>

    <!-- 文字标识 -->
    <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#374151">swlws</text>
</svg>
